<!DOCTYPE html>
<html>
<head>
    <title>Border Styles</title>
    <style>
       body{
        background-color: #D6D3D1;
       }
    </style>
</head>
<body>
    <h1>Types of border style</h1>
<!--types of all border style -->
<!--in this line border:3px xolid red this line define first we style border then width of border(3px),
solid tell style of border and red tell color of border -->
    <p style="border: 5px solid #6B7280;">Gray SOLID Border</p>
    <p style="border: 5px dotted #2563EB;">Blue DOTTED Border</p>
    <p style="border: 5px dashed #1E40AF;">Dark Blue DASHED Border</p>
    <p style="border: 5px double #0F766E;">Teal DOUBLE Border</p>
    <p style="border: 5px groove #374151;">Dark Gray GROOVE Border</p>
    <p style="border: 5px ridge #8A0303;">Blood Red Gray RIDGE Border</p>
    <p style="border: 5px inset #334155;">Slate INSET Border</p>
     <p style="border: 5px outset#800020;">Burgundy OUTSET Border</p>
      <p style="border: 5px none #111827;">Almost black NONE Border</p>

 

</body>
</html>
