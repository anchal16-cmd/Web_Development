<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Admission Form</title>
    <style>
    body {
        font-family: arial;
        background: linear-gradient(to right,#d0c6d1,#a81075);
    }
   
    .form-box {
        width: 400px;
        background: #f5f3f5;
        padding: 25px;
        margin:60px auto;
        border-radius: 10px;
        box-shadow: 0px 0px 10px rgb(66, 63, 63);
    }
        
        h1 {
        text-align: center;
    }

    input, select, textarea{
        width: 100%;
        padding: 8px;
        margin: 6px 0 12px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }
    button{
        width: 100%;
        padding: 10px;
        background: #380627;
        color: aliceblue;
        border: none;
        border-radius: 5px;
        font-size: 16px;
    }
    button:hover {
        background: #821e60;
    }
    </style>
</head>
<body>
<div class="form-box">
<h1>Student Registration Form</h1>
<form>

<label>Student Name</label>
<input type="text" required>

<label>Date of Birth</label>
<input type="date" required>

<label>Gender</label>
<select required>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<label>Email</label>
<input type="email" required>

<label>Phone Number</label>
<input type="tell" required>

<label>Address</label>
<textarea rows="3"></textarea>

<label>Course</label>
<select>
<option>B.Tech</option>
<option>BBA</option>
<option>BCA</option>
<option>B.Sc</option>
</select>

<button type="submit">Submit</button>

</form>
</div>
   
</body>
</html>
