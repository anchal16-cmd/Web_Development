<!DOCTYPE html>
<html>
<head>
    <title>Border Styles</title>
</head>
<body>
<!--types of all border style -->
<!--in this line border:3px xolid red this line define first we style border then width of border(3px),
solid tell style of border and red tell color of border -->
    <p style="border: 3px solid red;">Solid Border</p>
    <p style="border: 3px dashed blue;">Dashed Border</p>
    <p style="border: 3px dotted green;">Dotted Border</p>
    <p style="border: 3px double purple;">Double Border</p>
    <p style="border: 5px groove orange;">Groove Border</p>
    <p style="border: 5px ridge brown;">Ridge Border</p>
    <p style="border: 5px inset rgb(0, 128, 45);">Inset Border</p>
    <p style="border: 5px outset pink;">Outset Border</p>
    <p style="border: 3px none;">None Border</p>
    <p style="border: 3px hidden;">Hidden Border</p>

</body>
</html>
