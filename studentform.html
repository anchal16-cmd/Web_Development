<!DOCTYPE html>
<html lang="en">
<head>
    <title>Regestration Form</title>
    <link rel="stylesheet" href="style3.css">
</head>
<body>
    <header>
        <h1>Regestration Form</h1>
    </header>
    <form action="https://example.com/submit-form" method="post">
    <label for="QID">QID</label>
    <input class="myclass" type="number" placeholder="QID:">
    <br><br>
    <label for="Studentname">Student Name:</label>
    <input class="myclass" type="text" placeholder="First name">
    <input class="myclass" type="text" placeholder="Last name">
    <br><br>
    <label for="Fathername">Father Name:</label>
    <input class="myclass" type="text" placeholder="First name">
    <input class="myclass" type="text" placeholder="Last name">
    <br><br>
    <label for="Date of birth">Date of birth:</label>
    <input class="container" type="number" placeholder="day">
    <label>-</label>
    <input class="container" type="number" placeholder="month">
    <label>-</label>
    <input class="container" type="number" placeholder="year" min="1900" max="2026"> 
    <label>(DD-MM-YYYY)</label>
    <br><br>
    <label for="mobilenumber">Mobile No:</label>
    <input class="code" type="text" value="+91" readonly>
    <input class="myclass" type="number" placeholder="Number">
    <br><br>
    <label for="email">Email ID:</label>
    <input class="myclass" type="email" placeholder="email">
    <br><br>
    <label> Select your Gender:</label>
        <labelfor="101">
            <input type="radio" value="Male" name="year" id="106">Male</label>
     <labelfor="102">
            <input type="radio" value="Female" name="year" id2="107">Female</label>
    <br><br>
    <label>Select your year: </label>
    <labelfor="101">
            <input type="radio" value="1st year" name="year" id="101">1st year</label>
     <labelfor="102">
            <input type="radio" value="2nd year" name="year" id2="102">2nd year</label>
    <labelfor="103">
            <input type="radio" value="3rd year" name="year" id="103">3rd year</label>
     <labelfor="104">
            <input type="radio" value="4th year" name="year" id2="104">4th year</label>
     <br><br>
     <label for="course">Select Your Course:</label>
<select id="course" name="course">
    <option value="">----------------Select Course-------------------</option>

    <optgroup label="Undergraduate">
        <option>BCA</option>
        <option>B.Tech CSE</option>
        <option>B.Tech IT</option>
        <option>B.Sc Computer Science</option>
        <option>B.Sc Mathematics</option>
        <option>B.Com</option>
        <option>B.Com (Hons)</option>
        <option>BBA</option>
        <option>BA</option>
        <option>BA (Hons)</option>
        <option>B.Pharm</option>
        <option>LLB</option>
        <option>B.Ed</option>
    </optgroup>

    <optgroup label="Postgraduate">
        <option>MCA</option>
        <option>M.Tech CSE</option>
        <option>M.Sc Computer Science</option>
        <option>M.Sc Mathematics</option>
        <option>M.Com</option>
        <option>MBA</option>
        <option>MA</option>
        <option>LLM</option>
        <option>M.Ed</option>
    </optgroup>

    <optgroup label="Diploma">
        <option>Diploma in CSE</option>
        <option>Diploma in Mechanical</option>
        <option>Diploma in Civil</option>
        <option>Diploma in Electrical</option>
        <option>Diploma in IT</option>
    </optgroup>

    <optgroup label="Certification Courses">
        <option>Cyber Security</option>
        <option>Data Science</option>
        <option>Artificial Intelligence</option>
        <option>Web Development</option>
        <option>Cloud Computing</option>
        <option>Digital Marketing</option>
    </optgroup>
</select>
    <br><br>
    <label for="photo">Student Photo:</label>
    <input type="file" id="photo" accept="image/png, image/jpeg">
    <br><br>
    <label for="city">Select your City:</label>
    <select id="city" name="city">
         <option value="">-- Select City --</option>
        <option value="lucknow">Lucknow</option>
        <option value="kanpur">Kanpur</option>
        <option value="indore">Indore</option>
        <option value="bhopal">Bhopal</option>
        <option value="patna">Patna</option>
        <option value="ranchi">Ranchi</option>
        <option value="guwahati">Guwahati</option>
        <option value="bhubaneswar">Bhubaneswar</option>
        <option value="visakhapatnam">Visakhapatnam</option>
        <option value="vijayawada">Vijayawada</option>
        <option value="kochi">Kochi</option>
        <option value="trivandrum">Trivandrum</option>
        <option value="coimbatore">Coimbatore</option>
        <option value="madurai">Madurai</option>
        <option value="mysuru">Mysuru</option>
        <option value="mangaluru">Mangaluru</option>
        <option value="amritsar">Amritsar</option>
        <option value="ludhiana">Ludhiana</option>
        <option value="dehradun">Dehradun</option>
        <option value="shimla">Shimla</option>
        <option value="delhi">Delhi</option>
        <option value="mumbai">Mumbai</option>
        <option value="kolkata">Kolkata</option>
        <option value="chennai">Chennai</option>
        <option value="bangalore">Bangalore</option>
        <option value="hyderabad">Hyderabad</option>
        <option value="pune">Pune</option>
        <option value="ahmedabad">Ahmedabad</option>
        <option value="jaipur">Jaipur</option>
        <option value="chandigarh">Chandigarh</option>
    </select>
    <br><br>
<label for="address">Address:</label><br>
<textarea id="address" name="address" placeholder="Enter your full address"></textarea>
</body>
</html>
