<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <Style>
        body{
            font-family:Arial, Helvetica, sans-serif;
            background: linear-gradient(to right,#d0c6d1,#a81075);
        }

         .form-box {
        width: 400px;
        background: #f5f3f5;
        padding: 25px;
        margin:60px auto;
        border-radius: 10px;
        box-shadow: 0px 0px 10px rgb(66, 63, 63);
        }

       input, select, textarea{
        width: 100%;
        padding: 8px;
        margin: 6px 0 12px;
        border-radius: 5px;
        border: 1px solid #f9f7f7;
    }
       button{
        width: 100%;
        padding: 10px;
        background: #360a27;
        color: aliceblue;
        border: none;
        border-radius: 5px;
        font-size: 16px;
    }
    button:hover {
        background: #821e60;
    }
    </Style>
</head>
<body>
    <div class="form-box">
    <h2>Regestration form</h2>
    <form action="#">
        <label for="username">username</label>
        <input type="text" id="username" name="username" required>
        <br>
        <label for="password">password</label>
        <input type="password" id="password" name="password" required>
        <br>
      <label>Date of Birth</label>
      <input type="date" required>
      <button type="submit">Submit</button>
    </form> 
</div>
</body>
</html>
